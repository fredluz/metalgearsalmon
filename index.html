<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whisker Intrusion</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Mission status">
        <div>
          <p class="eyebrow">Tactical Espionage Cat</p>
          <h1>Whisker Intrusion</h1>
        </div>
        <div class="status-grid">
          <div>
            <span>Room</span>
            <strong id="roomLabel">Kennel Gate</strong>
          </div>
          <div>
            <span>Tags</span>
            <strong id="keyLabel">0/3</strong>
          </div>
          <div>
            <span>Alert</span>
            <strong id="alertLabel">Clear</strong>
          </div>
          <div>
            <span>Lure</span>
            <strong id="gadgetLabel">Ready</strong>
          </div>
        </div>
      </section>

      <section class="game-frame" aria-label="Whisker Intrusion game">
        <canvas id="game" width="960" height="640" aria-label="Top-down stealth cat game"></canvas>
        <div id="message" class="message" hidden></div>
      </section>

      <section class="controls" aria-label="Controls">
        <span><kbd>WASD</kbd> or <kbd>Arrows</kbd> move</span>
        <span><kbd>Shift</kbd> pad softly</span>
        <span><kbd>C</kbd> box cover</span>
        <span><kbd>Q</kbd> catnip lure</span>
        <span><kbd>F</kbd> whisker sense</span>
        <span><kbd>Space</kbd> meow lure</span>
        <span><kbd>E</kbd> scratch / vents / collect</span>
        <span><kbd>P</kbd> pause</span>
        <span><kbd>R</kbd> restart</span>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
